name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432

    env:
      GOOGLE_API_KEY: dummy
      SUPABASE_URL: dummy
      SUPABASE_SERVICE_KEY: dummy
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      GOOGLE_AUDIENCE_CLIENT_ID: dummy
      GROQ_API_KEY: dummy
      HF_API_KEY: dummy
      CLIST_API_KEY: dummy
      VERCEL_URL: dummy

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx flake8

      - name: Run Lint
        run: |
          cd backend
          flake8 .

      - name: Run Tests
        run: |
          cd backend
          pytest tests -v

      - name: Run Coverage
        run: |
          cd backend
          pip install coverage
          coverage run -m pytest
          coverage report